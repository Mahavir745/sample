  html, body, #root { height: 100%; }

  @keyframes blurFadeUp {

    to   { opacity: 1; filter: blur(0);    transform: translateY(0); }
  }
  .animate-blur-fade-up {
    opacity: 0;
    animation: blurFadeUp 1s ease-out forwards;
  }

  /* re-trigger animation on key change */
  @keyframes contentSwap {
    from { opacity: 0; filter: blur(14px); transform: translateY(18px); }
    to   { opacity: 1; filter: blur(0);    transform: translateY(0); }
  }
  .swap-in {
    animation: contentSwap 700ms ease-out forwards;
  }

  .liquid-glass {
    background: rgba(255, 255, 255, 0.01);
    background-blend-mode: luminosity;
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);
    border: none;
    box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
    position: relative;
    overflow: hidden;
    transition: background-color 200ms ease;
  }
  .liquid-glass:hover { background: rgba(255, 255, 255, 0.06); }
  .liquid-glass::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1.4px;
    background: linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.45) 0%,
      rgba(255, 255, 255, 0.15) 20%,
      rgba(255, 255, 255, 0) 40%,
      rgba(255, 255, 255, 0) 60%,
      rgba(255, 255, 255, 0.15) 80%,
      rgba(255, 255, 255, 0.45) 100%
    );
    -webkit-mask:
      linear-gradient(#fff 0 0) content-box,
      linear-gradient(#fff 0 0);
    mask:
      linear-gradient(#fff 0 0) content-box,
      linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  .bottom-blur-overlay {
    -webkit-backdrop-filter: blur(24px);
    backdrop-filter: blur(24px);
    -webkit-mask-image: linear-gradient(to top, black 0%, transparent 45%);
    mask-image: linear-gradient(to top, black 0%, transparent 45%);
  }

/* ---------- App ---------- */
function App() {
  const [menuOpen, setMenuOpen] = useState(false);
  const [pillarIdx, setPillarIdx] = useState(0);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  const setTweak = (k, v) => {
    setTweaks((t) => {
      const next = { ...t, [k]: v };
      try {
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
      } catch (_) {}
      return next;
    });
  };

  // Edit-mode protocol: register listener BEFORE announcing availability
  useEffect(() => {
    const onMsg = (e) => {
      if (!e?.data || typeof e.data !== "object") return;
      if (e.data.type === "__activate_edit_mode") setTweaksOpen(true);
      if (e.data.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", onMsg);
    try { window.parent.postMessage({ type: "__edit_mode_available" }, "*"); } catch (_) {}
    return () => window.removeEventListener("message", onMsg);
  }, []);

  const closeTweaks = () => {
    setTweaksOpen(false);
    try { window.parent.postMessage({ type: "__edit_mode_dismissed" }, "*"); } catch (_) {}
  };

  // Auto-cycle pillars
  useEffect(() => {
    if (!tweaks.autoCycle) return;
    const ms = Math.max(2000, (tweaks.cycleSeconds || 7) * 1000);
    const id = setInterval(() => {
      setPillarIdx((i) => (i + 1) % PILLARS.length);
    }, ms);
    return () => clearInterval(id);
  }, [tweaks.autoCycle, tweaks.cycleSeconds]);

  // Close mobile menu on resize past lg
  useEffect(() => {
    const onResize = () => { if (window.innerWidth >= 1024) setMenuOpen(false); };
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  return (
    <div className="relative w-full h-full bg-black overflow-hidden">
      <video
        className="fixed inset-0 w-full h-full object-cover"
        style={{ zIndex: 0 }}
        src={tweaks.videoUrl}
        autoPlay loop muted playsInline
      />
      <div className="bottom-blur-overlay fixed inset-0 pointer-events-none" style={{ zIndex: 1 }} />

      <div className="relative z-10 flex flex-col min-h-full h-full">
        <Navbar menuOpen={menuOpen} setMenuOpen={setMenuOpen} />
        <MobileMenu open={menuOpen} />
        <HeroContent pillarIdx={pillarIdx} setPillarIdx={setPillarIdx} />
      </div>

      {tweaksOpen && (
        <TweaksPanel tweaks={tweaks} setTweak={setTweak} onClose={closeTweaks} />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
